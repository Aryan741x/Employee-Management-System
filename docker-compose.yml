services:

  # ─────────────────────────────────────────────
  # ZOOKEEPER
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "10"]
      interval: 10s
      timeout: 15s
      retries: 15
      start_period: 30s

  # ─────────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s

  # ─────────────────────────────────────────────
  # KAFKA TOPIC INIT  (one-shot)
  # ─────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 \
          --create --if-not-exists \
          --topic employee-messages \
          --partitions 1 \
          --replication-factor 1
        echo "Topic employee-messages ready."
    restart: "no"

  # ─────────────────────────────────────────────
  # POSTGRESQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: capstone_project2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # LOCALSTACK  (S3)
  # ─────────────────────────────────────────────
  localstack:
    image: localstack/localstack:2.3
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 15

  # ─────────────────────────────────────────────
  # S3 BUCKET + DATA INIT  (one-shot)
  # ─────────────────────────────────────────────
  s3-init:
    image: amazon/aws-cli:2.15.0
    container_name: s3-init
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./data:/data
      - ./scripts/s3_init.sh:/s3_init.sh
    entrypoint: ["/bin/bash", "/s3_init.sh"]
    restart: "no"

  # ─────────────────────────────────────────────
  # AIRFLOW  (batch pipeline)
  # ─────────────────────────────────────────────
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    entrypoint: ["/bin/bash", "/opt/airflow/scripts/airflow_start.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      s3-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      # Ivy cache dir — where Spark downloads Maven jars
      - PYSPARK_PIN_THREAD=true
      - IVY_HOME=/opt/ivy2
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
      - ivy_cache:/opt/ivy2
    ports:
      - "8081:8080"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # KAFKA CONSUMER  (Spark Structured Streaming)
  # ─────────────────────────────────────────────
  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: kafka-consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
      s3-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - PYSPARK_SUBMIT_ARGS=--packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.spark:spark-avro_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.postgresql:postgresql:42.7.3 pyspark-shell
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ivy_cache:/opt/ivy2
    entrypoint: ["python3", "/opt/airflow/scripts/kafka/consumer.py"]
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # KAFKA PRODUCER  (run manually as needed)
  # docker compose run --rm kafka-producer
  # ─────────────────────────────────────────────
  kafka-producer:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      - PYTHONUNBUFFERED=1
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    volumes:
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    entrypoint: ["python3", "/opt/airflow/scripts/kafka/producer.py"]
    profiles:
      - tools

volumes:
  postgres_data:
  localstack_data:
  airflow_logs:
  ivy_cache: